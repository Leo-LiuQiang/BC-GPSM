url: https://leo-liuqiang.github.io/BC-GPSM/

home:
  title: Bias Corrected Generalized Propensity Score Matching
  description: >
    Bias-corrected generalized propensity score matching for observational
    studies with binary or multi-valued treatments. Flexible learners are
    optional; XGBoost and ranger integrations are experimental.

template:
  bootstrap: 5
  light-switch: true
  bslib:
    bootswatch: litera
    primary: "#1F6F78"
    secondary: "#8A5A44"
    success: "#4C956C"
    info: "#2F80ED"
    base_font: {google: "Source Sans 3"}
    heading_font: {google: "Source Serif 4"}
    code_font: {google: "JetBrains Mono"}
    border-radius: "0.35rem"
    pkgdown-nav-height: "72px"

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github, lightswitch]
  components:
    intro:
      text: Get started
      href: articles/drgpsm-workflow.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
      - text: Minimal BC-GPSM workflow
        href: articles/drgpsm-workflow.html
    github:
      icon: fab fa-github
      href: https://github.com/Leo-LiuQiang/BC-GPSM
      aria-label: GitHub

footer:
  structure:
    left: package
    right: [developed_by, built_with]

reference:
- title: Main workflow
  desc: Functions most users need for an analysis.
  contents:
  - dr_gpsm
  - gps_pre_process
  - gps_histogram
  - balance_check_plot
- title: Matching and contrasts
  desc: Lower-level tools used by the main estimator.
  contents:
  - gps_matching
  - build_contrast
- title: Propensity-score helpers
  desc: Advanced helpers for cross-fitting and GPS log-ratio construction.
  contents:
  - pmatch_fit_ps_fold
  - pmatch_compute_V

articles:
- title: Workflows
  navbar: ~
  contents:
  - drgpsm-workflow
